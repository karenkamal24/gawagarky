<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Realtime Notifications</title>
</head>
<body>

<h2>🔔 إشعارات مباشرة (Reverb)</h2>

<div id="notifications"></div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/laravel-echo@1.16.1/dist/echo.iife.js"></script>

<script>
const userId = 25;

window.Pusher = Pusher;

const echo = new Echo({
    broadcaster: 'pusher',

    key: 'localkey',

    wsHost: '127.0.0.1',
    wsPort: 6001,

    forceTLS: false,
    encrypted: false,

    enabledTransports: ['ws'],
    cluster: 'mt1',

    disableStats: true,

    authEndpoint: 'http://127.0.0.1:8000/broadcasting/auth',

    auth: {
        headers: {
            Accept: 'application/json',

            // ⚠️ مهم: لو عندك Sanctum استخدم cookie بدل Bearer
            Authorization: "Bearer 151|jgqCC9ta4ETP8PUYQRqrO4BO7zgofAXGHqOh7qywa5905108"
        }
    },
    withCredentials: true
});

// 🔔 الاشتراك في قناة خاصة
echo.private(`notifications.${userId}`)
    .listen('.NewNotificationEvent', (e) => {

        console.log('📩 Notification:', e);

        const div = document.createElement('div');
        div.style.padding = '10px';
        div.style.margin = '10px';
        div.style.background = '#e3f2fd';
        div.style.borderRadius = '8px';

        div.innerHTML = `
            <b>📌 ${e.title ?? 'إشعار'}</b><br>
            ${e.message ?? ''}<br>
            <small>🕒 ${e.created_at ?? ''}</small>
        `;

        document.getElementById('notifications').prepend(div);
    });

</script>

</body>
</html>
